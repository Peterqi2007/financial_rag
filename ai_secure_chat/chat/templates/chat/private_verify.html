{% extends "base.html" %}
{% block title %}隐私对话验证{% endblock %}

{% block main %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <div class="card text-center">
                <div class="card-body p-4 p-md-5">
                    <div class="mx-auto mb-3 d-inline-flex align-items-center justify-content-center"
                         style="width:64px;height:64px;border-radius:50%;
                                background:linear-gradient(135deg,var(--brand-500),var(--brand-700));
                                box-shadow:0 8px 18px rgba(31,107,238,.3);color:#fff;font-size:24px;">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <h4 class="text-primary fw-bold mb-2">隐私对话验证</h4>
                    <p class="text-muted mb-4">请输入隐私密码以解锁</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <input type="password" name="privacy_password" class="form-control form-control-lg text-center"
                                   placeholder="请输入密码" required autofocus>
                            {% if form.errors %}
                            <div class="text-danger small mt-2">
                                <i class="fa-solid fa-triangle-exclamation me-1"></i>密码错误，请重试
                            </div>
                            {% endif %}
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fa-solid fa-unlock me-1"></i> 验证解锁
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
