{% extends "base.html" %}
{% block title %}分类管理{% endblock %}

{% block main %}
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <div>
            <h3 class="text-primary fw-bold mb-1">
                <i class="fa-solid fa-layer-group me-2"></i>分类管理
            </h3>
            <div class="text-muted small">所有对话按分类 → 文件夹 → 对话条目三层结构组织。</div>
        </div>
        <a href="{% url 'chat:category_create' %}" class="btn btn-primary">
            <i class="fa-solid fa-plus me-1"></i> 新建分类
        </a>
    </div>

    <div class="row g-3">
        {% for category in categories %}
        <div class="col-md-6 col-lg-4">
            <div class="card h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="fw-bold mb-2">
                        <i class="fa-solid fa-folder-tree text-primary me-2"></i>{{ category.name }}
                    </h5>
                    <p class="text-muted small mb-3 flex-grow-1">{{ category.description|default:"暂无描述" }}</p>
                    <div class="d-flex gap-2 flex-wrap mt-auto">
                        <a href="{% url 'chat:folder_list' category.id %}" class="btn btn-sm btn-primary">
                            <i class="fa-solid fa-eye me-1"></i> 查看
                        </a>
                        <a href="{% url 'chat:category_update' category.id %}" class="btn btn-sm btn-warning">
                            <i class="fa-solid fa-pen me-1"></i> 编辑
                        </a>
                        <a href="{% url 'chat:category_delete' category.id %}"
                           onclick="return confirm('确定要删除该分类吗？删除后分类内的所有内容将一并删除！')"
                           class="btn btn-sm btn-danger">
                            <i class="fa-solid fa-trash me-1"></i> 删除
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12">
            <div class="card">
                <div class="card-body text-center py-5 text-muted">
                    <i class="fa-solid fa-box-open fs-1 mb-3 d-block"></i>
                    <p class="mb-3">暂无分类</p>
                    <a href="{% url 'chat:category_create' %}" class="btn btn-primary btn-sm">
                        <i class="fa-solid fa-plus me-1"></i> 创建第一个分类
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
